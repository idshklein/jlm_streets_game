<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>משחק הרחובות</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800&display=swap" rel="stylesheet" />

  <!-- Google Analytics (GA4) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>

  <style>
    :root {
      --bg: #f8f6ef;
      --panel: #fffdf6;
      --panel-border: #dbd3bf;
      --ink: #1f2a2d;
      --muted: #5c686b;
      --accent: #b66c24;
      --accent-strong: #8f4f12;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Rubik, "Segoe UI", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 100% 0%, #fff9e8 0%, var(--bg) 55%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 2.6rem;
      margin: 0 0 0.4rem;
      font-weight: 800;
    }

    .tagline {
      color: var(--muted);
      margin: 0 0 2.5rem;
      font-size: 1.05rem;
    }

    .city-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      margin-bottom: 3rem;
    }

    .city-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.65rem;
      padding: 2rem 1rem;
      background: var(--panel);
      border: 2px solid var(--panel-border);
      border-radius: 18px;
      text-decoration: none;
      color: var(--ink);
      font-weight: 700;
      font-size: 1.25rem;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
    }

    .city-card:hover {
      border-color: var(--accent);
      box-shadow: 0 6px 20px rgba(182, 108, 36, 0.18);
      transform: translateY(-3px);
    }

    .city-card .emoji {
      font-size: 2.8rem;
      line-height: 1;
    }

    footer {
      color: var(--muted);
      font-size: 0.85rem;
    }

    @media (max-width: 480px) {
      h1 { font-size: 2rem; }
      .city-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>משחק הרחובות</h1>
    <p class="tagline">בחרו עיר ונסו לנחש את שמות הרחובות</p>
    <div class="city-grid">
      <a href="./jlm/" class="city-card">
        <span class="emoji">🕍</span>
        <span>ירושלים</span>
      </a>
      <a href="./tlv/" class="city-card">
        <span class="emoji">🏙️</span>
        <span>תל אביב</span>
      </a>
    </div>
    <footer>נוצר על ידי עדו קליין</footer>
  </div>
</body>
</html>
