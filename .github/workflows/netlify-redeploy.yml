name: Netlify Redeploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Inject GA Measurement ID
        env:
          GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}
        run: |
          if [ -n "$GA_MEASUREMENT_ID" ]; then
            sed -i "s/G-XXXXXXXXXX/$GA_MEASUREMENT_ID/g" index.html
            echo "Injected GA measurement ID into index.html"
          else
            echo "GA_MEASUREMENT_ID secret is not set; keeping placeholder"
          fi

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: netlify deploy --dir . --prod --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN"
