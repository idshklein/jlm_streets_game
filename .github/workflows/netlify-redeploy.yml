name: Netlify Redeploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Inject GA Measurement ID
        env:
          GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}
        run: |
          if [ -n "$GA_MEASUREMENT_ID" ]; then
            # Replace placeholder in all HTML files across root and city sub-folders
            find . -name "index.html" -not -path "./.git/*" \
              -exec sed -i "s/G-XXXXXXXXXX/$GA_MEASUREMENT_ID/g" {} +
            echo "Injected GA measurement ID into all index.html files"
          else
            echo "GA_MEASUREMENT_ID secret is not set; keeping placeholder"
          fi

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          # Site: isr-streets-game (3915ffd1-d4e6-4752-bed1-3881ca8af864)
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: netlify deploy --dir . --prod --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN"
